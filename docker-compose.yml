services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  server:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_DIALECT: mysql
    command: sh -c "npm run seed"
    restart: "no"

  seed:
    build: ./server
    depends_on:
      server:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_DIALECT: mysql
    command: npm run seed
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      API_TARGET: http://server:3001
    restart: unless-stopped

volumes:
  db_data:
